# --- Monitors ---
monitor = , preferred, auto, 1

# --- Variables ---
$terminal    = kitty
$fileManager = kitty -e yazi
$menu        = wofi --show drun --conf ~/.config/wofi/config --style ~/.config/wofi/style.css

# --- Environment Variables ---
# NVIDIA hardware acceleration & Wayland support
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = MOZ_ENABLE_WAYLAND,1
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_FONT,JetBrainsMono Nerd Font
env = QT_FONT,JetBrainsMono Nerd Font
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

# --- Autostart ---
exec-once = hyprlock
exec-once = hypridle
exec-once = ags run
exec-once = sleep 2 && snixembed --fork
exec-once = swww-daemon
exec-once = pypr
exec-once = pactl set-sink-mute @DEFAULT_SINK@ 0
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

# --- Appearance ---
general {
    gaps_in  = 6
    gaps_out = 12
    border_size = 2
    col.active_border   = rgba(cdd6f4ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244aa)
    resize_on_border  = true
    allow_tearing     = false
    layout            = dwindle
}

decoration {
    rounding = 14
    active_opacity   = 1.0
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0

    blur {
        enabled           = true
        size              = 8
        passes            = 2
        new_optimizations = true
        ignore_opacity    = true
        xray              = false
        special           = true
        popups            = true
        popups_ignorealpha = 0.2
    }

    shadow {
        enabled      = true
        range        = 24
        render_power = 3
        color        = rgba(00000066)
        color_inactive = rgba(00000033)
    }
}

# --- Input ---
input {
    kb_layout  = latam
    follow_mouse = 1
    mouse_refocus  = false

    touchpad {
        natural_scroll  = true
        tap-to-click    = true
        drag_lock       = true
    }

    sensitivity  = 0
    accel_profile = flat
}

# --- Animations ---
animations {
    enabled = true

    bezier = easeOutExpo,    0.16, 1,     0.3,  1
    bezier = easeOutQuart,   0.25, 1,     0.5,  1
    bezier = easeInOutCubic, 0.65, 0,     0.35, 1
    bezier = spring,         0.155, 1.105, 0.295, 1.12
    bezier = linear,         0,    0,     1,    1

    animation = windows,     1, 4, spring,         popin 75%
    animation = windowsIn,   1, 4, easeOutExpo,    popin 75%
    animation = windowsOut,  1, 3, easeInOutCubic, popin 85%
    animation = windowsMove, 1, 3, easeOutQuart,   slide
    animation = border,      1, 8,  linear
    animation = borderangle, 1, 60, linear, loop
    animation = fade,        1, 4, easeOutExpo
    animation = fadeIn,      1, 4, easeOutExpo
    animation = fadeOut,     1, 3, easeInOutCubic
    animation = workspaces,        1, 4, easeOutQuart,   slidefade 25%
    animation = specialWorkspace, 1, 4, easeOutExpo,    slidevert
    animation = layers,           1, 3, easeOutExpo,    slide
}

# --- Keybinds ---
$mainMod = SUPER

bind = $mainMod,       RETURN, exec, $terminal
bind = $mainMod,       C,      killactive
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       Ñ,      exec, hyprlock
bind = $mainMod,       N,      exec, $terminal -e nvim
bind = $mainMod,       V,      togglefloating
bind = $mainMod,       SPACE,  exec, $menu
bind = $mainMod,       F,      fullscreen
bind = $mainMod,       P,      pin

# Focus & Swapping
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod CTRL, H, swapwindow, l
bind = $mainMod CTRL, L, swapwindow, r
bind = $mainMod CTRL, K, swapwindow, u
bind = $mainMod CTRL, J, swapwindow, d

# Workspace management
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Resizing
binde = $mainMod SHIFT, H, resizeactive, -20 0
binde = $mainMod SHIFT, L, resizeactive,  20 0
binde = $mainMod SHIFT, K, resizeactive,  0 -20
binde = $mainMod SHIFT, J, resizeactive,  0  20

# Screenshots
bind = SUPER,        S, exec, grim -g "$(slurp)" - | swappy -f -
bind = SUPER SHIFT, S, exec, grim - | swappy -f -

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Layout ---
dwindle {
    preserve_split = true
    force_split    = 1
    smart_split    = true
    smart_resizing = true
}

# --- Misc ---
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    focus_on_activate        = true
    vrr                      = 1
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
}

# --- Window Rules ---
windowrule = match:class ^(ags)$,       opacity 0.7
windowrule = match:class ^(zathura)$,   opacity 0.7
windowrule = match:class ^(mpvpaper)$,  no_blur 1, no_shadow 1, pin 1
windowrule = match:class ^(spotify)$,   workspace 2
windowrule = match:class ^(steam)$,     workspace 3
windowrule = match:class ^(pavucontrol)$, float 1, size 700 450, center 1
windowrule = match:class ^(nm-connection-editor)$, float 1, center 1

# --- Layer Rules ---
layerrule = blur on,           match:namespace bar
layerrule = ignore_alpha 0.1,  match:namespace bar
layerrule = blur on,           match:namespace LeftSidebar
layerrule = ignore_alpha 0.1,  match:namespace LeftSidebar
layerrule = blur on,           match:namespace RightSidebar
layerrule = ignore_alpha 0.1,  match:namespace RightSidebar
layerrule = blur on,           match:namespace CalendarWin
layerrule = blur on,           match:namespace WallpaperSelector
layerrule = ignore_alpha 0.1,  match:namespace WallpaperSelector
layerrule = blur on,           match:namespace osd
layerrule = ignore_alpha 0.1,  match:namespace osd
layerrule = blur on,           match:namespace wofi
layerrule = ignore_alpha 0.1,  match:namespace wofi
layerrule = animation slide,   match:namespace wofi
